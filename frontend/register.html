<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TaskPriority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <h2>Create an Account</h2>
            <p>Start managing your tasks effectively today.</p>
        </div>
        
        <div id="auth-error" class="error-message" style="display: none;"></div>
        <div id="auth-success" class="success-message" style="display: none;">Registration successful! Check your email to verify your account or login.</div>
        
        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6">
                <small>Password must be at least 6 characters long.</small>
            </div>
            
            <button type="submit" id="register-btn" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Log in</a></p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
