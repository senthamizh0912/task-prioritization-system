<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskPriority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page">

    <div class="modal-overlay" id="task-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Add New Task</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-name">Task Name</label>
                    <input type="text" id="task-name" required placeholder="What needs to be done?">
                </div>
                
                <div class="form-row">
                    <div class="form-group half">
                        <label for="deadline">Deadline (Optional)</label>
                        <input type="datetime-local" id="deadline">
                    </div>
                </div>

                <div class="scoring-info">
                    <p>Score your task from 1 (Low) to 5 (High).</p>
                    <p><small>Formula: (Urgency × 2) + Importance - Effort</small></p>
                </div>

                <div class="form-row">
                    <div class="form-group third">
                        <label for="urgency" title="How soon does this need to be done?">Urgency (1-5)</label>
                        <input type="number" id="urgency" min="1" max="5" required value="3">
                    </div>
                    
                    <div class="form-group third">
                        <label for="importance" title="How much value does this add?">Importance (1-5)</label>
                        <input type="number" id="importance" min="1" max="5" required value="3">
                    </div>
                    
                    <div class="form-group third">
                        <label for="effort" title="How hard is this to complete?">Effort (1-5)</label>
                        <input type="number" id="effort" min="1" max="5" required value="3">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Save Task</button>
            </form>
        </div>
    </div>

    <nav class="navbar dashboard-nav">
        <div class="logo">
            <h1>TaskPriority</h1>
        </div>
        <div class="user-menu">
            <span id="user-email">Loading...</span>
            <button id="logout-btn" class="btn btn-outline btn-small">Log Out</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h2>Your Tasks</h2>
                <p>Prioritized automatically to maximize your impact.</p>
            </div>
            <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
        </header>

        <section class="task-list-section">
            <div id="loading-spinner" class="loading">Loading tasks...</div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <ul class="task-list" id="task-list" style="display: none;">
                <!-- Tasks will be dynamically injected here -->
            </ul>
            
            <div id="empty-state" class="empty-state" style="display: none;">
                <p>No tasks found. Add a new task to get started!</p>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
